<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UK Muscle Protocol Tracker - Professional 6-week personalized protocol journal">
    <meta name="theme-color" content="#22aa44">
    <title>UK Muscle Protocol Journal - Tommie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #22aa44;
            --primary-dark: #1a8833;
            --secondary: #ff9800;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #2d2d2d;
            --accent: #ffd700;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(34, 170, 68, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 152, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .header {
            text-align: center;
            padding: 50px 20px 40px;
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.8s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-wrapper { margin-bottom: 30px; animation: zoomIn 0.8s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .logo {
            max-width: 280px;
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 10px 30px rgba(34, 170, 68, 0.3));
        }
        .logo img { width: 100%; height: auto; display: block; border-radius: 8px; }
        h1.client-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px; font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin: 20px 0 10px; text-transform: uppercase;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .subtitle { color: var(--text-secondary); font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 30px; animation: fadeInUp 0.8s ease-out 0.3s both; }
        .quote-section {
            background: linear-gradient(135deg, rgba(34, 170, 68, 0.1) 0%, rgba(255, 152, 0, 0.05) 100%);
            border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 40px;
            text-align: center; animation: fadeInUp 0.8s ease-out 0.4s both;
            min-height: 140px; display: flex; flex-direction: column; justify-content: center;
        }
        .quote-text { font-size: 20px; font-weight: 600; line-height: 1.6; margin-bottom: 12px; color: var(--text-primary); font-style: italic; }
        .quote-author { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; animation: fadeInUp 0.8s ease-out 0.5s both; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: 600; color: var(--text-primary); margin-bottom: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        select {
            padding: 14px 16px; background-color: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; color: var(--text-primary); font-size: 15px; font-weight: 500; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        select:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(34, 170, 68, 0.15); }
        select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(34, 170, 68, 0.2); }
        select option { background-color: var(--bg-card); color: var(--text-primary); }
        #content { animation: fadeInUp 0.8s ease-out 0.6s both; }
        .week-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 32px; border-radius: 12px; margin-bottom: 30px; text-align: center;
            box-shadow: 0 10px 40px rgba(34, 170, 68, 0.2);
        }
        .week-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .week-header p { font-size: 14px; opacity: 0.95; }
        .pct-reminder {
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.2) 0%, rgba(255, 152, 0, 0.1) 100%);
            border-left: 4px solid var(--secondary); padding: 24px; border-radius: 8px; margin-bottom: 30px;
        }
        .pct-reminder h3 { font-size: 16px; margin-bottom: 8px; color: var(--secondary); }
        .pct-reminder p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        .schedule-grid { display: flex; flex-direction: column; gap: 16px; }
        .schedule-item {
            background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--primary);
            padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .schedule-item:hover { border-color: var(--primary); box-shadow: 0 8px 24px rgba(34, 170, 68, 0.15); transform: translateY(-2px); }
        .schedule-item.completed { background: rgba(34, 170, 68, 0.08); border-left-color: var(--accent); }
        .schedule-item.completed .schedule-item-label { opacity: 0.5; text-decoration: line-through; }
        .schedule-item-label { font-weight: 700; color: var(--text-primary); min-width: 160px; font-size: 15px; }
        .schedule-item-details { display: flex; gap: 30px; flex: 1; margin: 0 25px; }
        .detail { display: flex; flex-direction: column; }
        .detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; font-weight: 600; }
        .detail-value { font-weight: 700; color: var(--text-primary); font-size: 16px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; accent-color: var(--primary); transition: transform 0.2s; }
        input[type="checkbox"]:hover { transform: scale(1.1); }
        input[type="checkbox"]:checked { filter: drop-shadow(0 0 6px rgba(34, 170, 68, 0.5)); }
        .empty-state { text-align: center; color: var(--text-secondary); padding: 80px 20px; font-size: 16px; }
        .footer { border-top: 1px solid var(--border); padding: 40px 20px; text-align: center; margin-top: 50px; color: var(--text-secondary); font-size: 12px; }
        .footer p { margin-bottom: 8px; }
        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
            .schedule-item { flex-direction: column; align-items: flex-start; }
            .schedule-item-details { margin-top: 16px; margin-left: 0; width: 100%; gap: 15px; flex-wrap: wrap; }
            .checkbox-wrapper { margin-top: 16px; width: 100%; }
            h1.client-name { font-size: 40px; }
            .week-header h2 { font-size: 28px; }
            .quote-text { font-size: 18px; }
            .logo { max-width: 200px; }
        }
        @media (max-width: 480px) {
            .header { padding: 30px 15px 25px; }
            h1.client-name { font-size: 32px; }
            .quote-section { padding: 20px; }
            .week-header { padding: 20px; }
            .schedule-item { padding: 16px; }
        }
    </style>
</head>

                <label for="weekSelect">Select Week</label>

                    <option value="2">Week 2</option>

            </div>
            <div class="control-group">
                <label for="daySelect">Select Day</label>
                <select id="daySelect">
                    <option value="">Choose a day...</option>
                    <option value="monday">Monday</option>
                    <option value="tuesday">Tuesday</option>
                    <option value="wednesday">Wednesday</option>
                    <option value="thursday">Thursday</option>
                    <option value="friday">Friday</option>
                    <option value="saturday">Saturday</option>
                    <option value="sunday">Sunday</option>

            <p>UK Muscle Protocol Journal™ | Medical supervision required</p>
            <p>Track your progress. Maintain compliance. Achieve your goals.</p>
        </div>

    <script>
        const quotes = [
            { text: "Champions aren't made in gyms. Champions are made from something they have deep inside them — a desire, a dream, a vision.", author: "Muhammad Ali" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "The difference between who you are and who you want to be is what you do.", author: "Bill Phillips" },
            { text: "Your body can stand almost anything. It's your mind that you have to convince.", author: "A.P.J. Abdul Kalam" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "The pain you feel today will be the strength you feel tomorrow.", author: "Arnold Schwarzenegger" },
            { text: "Excellence is not a skill, it's an attitude.", author: "Ralph Marston" },
            { text: "Every champion was once a contender who refused to give up.", author: "Rocky Balboa" },
            { text: "Your limitations—only your mind.", author: "Unknown" }
        ];

        const protocol = {
            1: {
                monday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                tuesday: [], wednesday: [],
                thursday: [

                ],

            },
            2: {

                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],

                thursday: [

                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                friday: [], saturday: [], sunday: []
            },
            3: {

                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                tuesday: [], wednesday: [],
                thursday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                friday: [], saturday: [], sunday: []
            },
            4: {
                monday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                tuesday: [], wednesday: [],
                thursday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                friday: [], saturday: [], sunday: []
            },
            5: {
                monday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                tuesday: [], wednesday: [],
                thursday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                friday: [], saturday: [],
                sunday: [
                    { compound: 'PCT Planning', dosage: 'Begin preparation', notes: 'Consult medical advisor' }
                ]
            },
            6: {
                monday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                tuesday: [], wednesday: [],
                thursday: [
                    { compound: 'Testosterone Cypionate', dosage: '3ml', notes: 'IM Injection' },
                    { compound: 'Anastrozole', dosage: '0.5mg', notes: 'Oral' }
                ],
                friday: [], saturday: [], sunday: []
            }
        };

        function updateQuote(week, day) {
            const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
            const dayIndex = days.indexOf(day);
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            if ([0,2,4,6].includes(dayIndex)) {
                const qi = ((week - 1) + Math.floor(dayIndex / 2)) % quotes.length;
                quoteText.textContent = quotes[qi].text;
                quoteAuthor.textContent = quotes[qi].author;
                quoteText.parentElement.style.opacity = '1';
            } else {
                quoteText.parentElement.style.opacity = '0.5';
                quoteText.textContent = 'Focus on the protocol. Trust the process.';
                quoteAuthor.textContent = 'UK Muscle';
            }
        }

        function getStorageKey(w, d) { return `protocol_${w}_${d}`; }
        function loadProgress(w, d) { return JSON.parse(localStorage.getItem(getStorageKey(w,d)) || '{}'); }
        function saveProgress(w, d, data) { localStorage.setItem(getStorageKey(w,d), JSON.stringify(data)); }

        function renderSchedule() {
            const week = document.getElementById('weekSelect').value;
            const day = document.getElementById('daySelect').value;
            const content = document.getElementById('content');
            if (!week || !day) { content.innerHTML = '<div class="empty-state">Select a week and day to view your protocol</div>'; updateQuote(1,'monday'); return; }
            updateQuote(parseInt(week), day);
            const schedule = protocol[week][day];
            const progress = loadProgress(week, day);
            let html = `<div class="week-header"><h2>Week ${week}</h2><p>${day.charAt(0).toUpperCase()+day.slice(1)}</p></div>`;
            if (week == 5 && day === 'sunday' && schedule.length > 0) {
                html = `<div class="pct-reminder"><h3>⚠️ PCT Planning Phase</h3><p>Begin preparation for Post-Cycle Therapy. Consult with your medical advisor to establish your PCT protocol starting after Week 6.</p></div>` + html;
            }
            if (schedule.length === 0) {
                html += '<div class="empty-state">No protocol scheduled for this day. Rest day.</div>';
            } else {
                html += '<div class="schedule-grid">';
                schedule.forEach((item, index) => {
                    const done = progress[index] || false;
                    const cid = `dose_${week}_${day}_${index}`;
                    html += `<div class="schedule-item ${done?'completed':''}">
                        <div class="schedule-item-label">${item.compound}</div>
                        <div class="schedule-item-details">
                            <div class="detail"><span class="detail-label">Dosage</span><span class="detail-value">${item.dosage}</span></div>
                            <div class="detail"><span class="detail-label">Administration</span><span class="detail-value">${item.notes}</span></div>
                        </div>
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="${cid}" ${done?'checked':''} onchange="toggleDose(${week},'${day}',${index})">
                            <label for="${cid}" style="margin:0;cursor:pointer;font-size:12px;color:var(--text-secondary);user-select:none;">Complete</label>
                        </div>
                    </div>`;
                });
                html += '</div>';
            }
            content.innerHTML = html;
        }

        function toggleDose(w, d, i) { const p = loadProgress(w,d); p[i] = !p[i]; saveProgress(w,d,p); renderSchedule(); }

        document.getElementById('weekSelect').addEventListener('change', renderSchedule);
        document.getElementById('daySelect').addEventListener('change', renderSchedule);
    </script>
